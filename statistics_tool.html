<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistical Analysis Tool — Two-Dataset Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/jstat@1.9.6/dist/jstat.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   DARK THEME — matches PyQt5 desktop app
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e1e; --bg2: #252526; --bg3: #2d2d2d; --bg4: #3c3c3c;
  --fg: #d4d4d4; --accent: #0e639c; --accent-h: #1177bb; --green: #2d6a2d;
  --green-h: #3a8a3a; --blue: #569cd6; --orange: #ce9178; --yellow: #dcdcaa;
  --teal: #4ec9b0; --red: #f44747;
}
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
button { cursor: pointer; font-family: inherit; }
/* ── Toolbar ── */
#toolbar { background: var(--bg3); padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--bg4); flex-shrink: 0; flex-wrap: wrap; }
#toolbar button { border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: bold; color: #fff; }
#toolbar button:hover { filter: brightness(1.15); }
#btn-run { background: var(--accent); }
#btn-hyp { background: #5a5a5a; }
#btn-export { background: var(--green); }
#btn-export:disabled { background: #444; color: #888; cursor: not-allowed; }
#toolbar .lang-btns { display: flex; gap: 4px; margin-left: auto; }
#toolbar .lang-btns button { background: var(--bg4); color: #888; padding: 6px 14px; font-size: 12px; border-radius: 4px; }
#toolbar .lang-btns button.active { background: var(--accent); color: #fff; }
#status-label { color: #888; font-size: 13px; margin-left: 8px; }
/* ── Main layout ── */
#main { display: flex; flex: 1; overflow: hidden; }
/* ── Left panel ── */
#left { width: 420px; flex-shrink: 0; border-right: 2px solid var(--bg4); display: flex; flex-direction: column; background: var(--bg); }
#left .tabs { display: flex; background: var(--bg3); }
#left .tabs button { flex: 1; padding: 10px; border: none; background: var(--bg3); color: #888; font-size: 13px; font-weight: bold; border-bottom: 2px solid transparent; }
#left .tabs button.active { color: var(--blue); border-bottom-color: var(--blue); background: var(--bg); }
#left .tabs button:hover { color: var(--fg); }
.ds-panel { display: none; flex: 1; flex-direction: column; padding: 8px; }
.ds-panel.active { display: flex; }
.ds-panel h3 { font-size: 15px; font-weight: bold; color: var(--fg); margin-bottom: 6px; }
.ds-panel textarea { flex: 1; background: var(--bg2); color: var(--fg); border: 1px solid var(--bg4); border-radius: 4px; padding: 8px; font-family: 'DejaVu Sans Mono', 'Consolas', 'Monaco', monospace; font-size: 13px; resize: none; min-height: 120px; }
.ds-panel .btns { display: flex; gap: 6px; margin-top: 8px; }
.ds-panel .btns button { flex: 1; padding: 8px; border: none; border-radius: 4px; background: var(--bg4); color: var(--fg); font-size: 12px; font-weight: bold; }
.ds-panel .btns button:hover { background: #4c4c4c; }
.ds-panel .count { color: #888; font-size: 12px; margin-top: 4px; }
/* ── Resizer ── */
#resizer { width: 4px; cursor: col-resize; background: var(--bg4); flex-shrink: 0; }
#resizer:hover { background: var(--accent); }
/* ── Right panel ── */
#right { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#result-tabs { display: flex; background: var(--bg3); flex-shrink: 0; overflow-x: auto; }
#result-tabs button { padding: 8px 16px; border: none; background: var(--bg3); color: #888; font-size: 12px; font-weight: bold; border-bottom: 2px solid transparent; white-space: nowrap; }
#result-tabs button.active { color: var(--blue); border-bottom-color: var(--blue); background: var(--bg); }
#result-tabs button:hover { color: var(--fg); }
#result-content { flex: 1; overflow-y: auto; padding: 12px; }
/* ── Tables ── */
.stats-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.stats-table th, .stats-table td { padding: 6px 10px; border: 1px solid var(--bg4); text-align: center; }
.stats-table th { background: var(--bg3); color: var(--fg); font-weight: bold; }
.stats-table td { background: var(--bg2); }
.stats-table tr:nth-child(even) td { background: #2a2a2b; }
.section-title { font-size: 14px; font-weight: bold; color: var(--blue); padding: 12px 4px 6px 4px; }
.commentary { font-size: 12px; color: #888; padding: 6px 8px; background: var(--bg2); border-radius: 4px; border-left: 3px solid var(--blue); margin: 6px 0; line-height: 1.5; }
.commentary-title { font-size: 13px; font-weight: bold; color: var(--yellow); padding: 8px 4px 2px 4px; }
.sig { color: var(--teal); font-weight: bold; }
.not-sig { color: var(--orange); font-weight: bold; }
.chart-container { width: 100%; min-height: 380px; margin: 12px 0; }
.eq { font-size: 13px; color: var(--yellow); padding: 4px; font-family: monospace; }
.note { color: #888; font-size: 11px; padding: 8px 4px; }
/* ── Status bar ── */
#statusbar { background: #007acc; color: #fff; font-size: 12px; padding: 4px 10px; flex-shrink: 0; }
#credit { text-align: right; padding: 4px 12px; font-size: 14px; font-weight: bold; color: #fff; flex-shrink: 0; }
/* ── H₀ dialog ── */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
.modal.show { display: flex; }
.modal-content { background: var(--bg); padding: 24px; border-radius: 8px; min-width: 320px; border: 1px solid var(--bg4); }
.modal-content h3 { margin-bottom: 16px; color: var(--fg); }
.modal-content label { display: block; margin: 8px 0 4px; font-size: 13px; color: var(--fg); }
.modal-content input { width: 100%; padding: 8px; background: var(--bg2); color: var(--fg); border: 1px solid var(--bg4); border-radius: 4px; font-size: 13px; }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-btns button { padding: 8px 20px; border: none; border-radius: 4px; font-size: 13px; }
.modal-btns .ok { background: var(--accent); color: #fff; }
.modal-btns .cancel { background: var(--bg4); color: var(--fg); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     TOOLBAR
     ═══════════════════════════════════════════ -->
<div id="toolbar">
  <button id="btn-run" onclick="runAnalysis()">▶ Run Analysis</button>
  <button id="btn-hyp" onclick="showHypDialog()">🎯 Set H₀ Means</button>
  <button id="btn-export" onclick="exportResults()" disabled>📥 Export</button>
  <span id="status-label">Enter data in both datasets, then click Analyze</span>
  <div class="lang-btns">
    <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
    <button id="btn-ro" onclick="setLang('ro')">RO</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════ -->
<div id="main">
  <!-- Left: Data Input -->
  <div id="left">
    <div class="tabs">
      <button id="tab-ds1" class="active" onclick="switchDsTab(1)">Dataset 1</button>
      <button id="tab-ds2" onclick="switchDsTab(2)">Dataset 2</button>
    </div>
    <div class="ds-panel active" id="panel-ds1">
      <h3>Dataset 1 (X)</h3>
      <textarea id="data1" placeholder="Enter numbers, one per line or space/tab/comma separated..."></textarea>
      <div class="btns">
        <button onclick="importFile(1)">📂 Import</button>
        <button onclick="pasteData(1)">📋 Paste</button>
        <button onclick="clearData(1)">🗑 Clear</button>
      </div>
      <div class="count" id="count1">0 values</div>
    </div>
    <div class="ds-panel" id="panel-ds2">
      <h3>Dataset 2 (Y)</h3>
      <textarea id="data2" placeholder="Enter numbers, one per line or space/tab/comma separated..."></textarea>
      <div class="btns">
        <button onclick="importFile(2)">📂 Import</button>
        <button onclick="pasteData(2)">📋 Paste</button>
        <button onclick="clearData(2)">🗑 Clear</button>
      </div>
      <div class="count" id="count2">0 values</div>
    </div>
  </div>
  <div id="resizer"></div>
  <!-- Right: Results -->
  <div id="right">
    <div id="result-tabs"></div>
    <div id="result-content"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     STATUS BAR + CREDIT
     ═══════════════════════════════════════════ -->
<div id="statusbar">Ready — Alex's Statistical Analysis Tool</div>
<div id="credit">Made with ❤️ by Alex Nica — for friends, students &amp; researchers. Vibe code with agent Gogu</div>

<!-- ═══════════════════════════════════════════
     H₀ MEANS DIALOG
     ═══════════════════════════════════════════ -->
<div class="modal" id="hyp-modal">
  <div class="modal-content">
    <h3 id="hyp-title">One-Sample t-Test Parameters</h3>
    <label for="hyp-mean1">H₀ mean for Dataset 1:</label>
    <input type="number" id="hyp-mean1" value="0" step="any">
    <label for="hyp-mean2">H₀ mean for Dataset 2:</label>
    <input type="number" id="hyp-mean2" value="0" step="any">
    <div class="modal-btns">
      <button class="cancel" onclick="hideHypDialog()">Cancel</button>
      <button class="ok" onclick="setHypMeans()">OK</button>
    </div>
  </div>
</div>

function tr(key, kwargs) {
  let s = (S[key] && S[key][lang]) ? S[key][lang] : key;
  if (kwargs) for (let k in kwargs) s = s.replace('{'+k+'}', kwargs[k]);
  return s;
}

// Translate strength labels
function strengthTr(en) { return tr('strength_'+en.replace(/ /g,'_')); }

// Format p-value
function fmtP(p) {
  if (p < 0.0001) return 'p < 0.0001';
  if (p < 0.001) return 'p = ' + p.toFixed(4);
  return 'p = ' + p.toFixed(5);
}

// Strength label from |r|
function strengthLabel(r) {
  const a = Math.abs(r);
  if (a < 0.1) return 'negligible';
  if (a < 0.3) return 'small';
  if (a < 0.5) return 'medium';
  if (a < 0.7) return 'large';
  return 'very large';
}

let hypMean1 = 0, hypMean2 = 0;

function parseData(text) {
  if (!text || !text.trim()) return [];
  const nums = [];
  const lines = text.split(/[\n\r]+/);
  for (let line of lines) {
    line = line.trim(); if (!line) continue;
    const tokens = line.split(/[\t,; ]+/);
    for (let t of tokens) {
      t = t.trim();
      if (t) { const n = parseFloat(t.replace(',', '.')); if (!isNaN(n)) nums.push(n); }
    }
  }
  return nums;
}

function getData(num) {
  const el = document.getElementById('data' + num);
  const data = parseData(el.value);
  document.getElementById('count' + num).textContent = data.length + ' values';
  return data;
}

function clearData(num) { document.getElementById('data'+num).value = ''; document.getElementById('count'+num).textContent = '0 values'; }

function pasteData(num) {
  // Try clipboard API first (needs HTTPS/localhost), fall back to prompt
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(t => {
      document.getElementById('data'+num).value = t; getData(num);
    }).catch(() => promptPaste(num));
  } else {
    promptPaste(num);
  }
}
function promptPaste(num) {
  const text = prompt('Paste data (numbers separated by spaces, tabs, commas, or newlines):');
  if (text) { document.getElementById('data'+num).value = text; getData(num); }
}

function importFile(num) {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.csv,.txt,.xlsx,.xls';
  inp.onchange = async e => {
    const f = e.target.files[0]; if (!f) return;
    let text = '';
    if (f.name.match(/\.xlsx?$/i)) {
      const data = await f.arrayBuffer();
      const wb = XLSX.read(data);
      const sheet = wb.Sheets[wb.SheetNames[0]];
      text = XLSX.utils.sheet_to_csv(sheet);
    } else { text = await f.text(); }
    document.getElementById('data'+num).value = text;
    getData(num);
  };
  inp.click();
}

['data1','data2'].forEach(id => document.getElementById(id).addEventListener('input', () => {
  const n = id.slice(-1);
  document.getElementById('count'+n).textContent = parseData(document.getElementById(id).value).length + ' values';
}));

// 4. STATISTICAL ENGINE (pure JS via jStat)
// ═══════════════════════════════════════════════════════════════

function descriptiveStats(data, name) {
  const n = data.length;
  const mean = jStat.mean(data);
  const median = jStat.median(data);
  const modeRaw = jStat.mode(data);
  const mode = Array.isArray(modeRaw) ? modeRaw[0] : modeRaw;
  const stdev = jStat.stdev(data, true);
  const variance = jStat.variance(data, true);
  const sem = stdev / Math.sqrt(n);
  const min = jStat.min(data);
  const max = jStat.max(data);
  const range = max - min;
  const q1 = jStat.percentile(data, 0.25);
  const q3 = jStat.percentile(data, 0.75);
  const iqr = q3 - q1;
  const skewness = jStat.skewness(data);
  const kurtosis = jStat.kurtosis(data);
  const tcrit = jStat.studentt.inv(0.975, n - 1);
  const ci_lower = mean - tcrit * sem;
  const ci_upper = mean + tcrit * sem;
  const sum = jStat.sum(data);
  return { name, n, mean, median, mode, std: stdev, variance, sem, min, max, range, q1, q3, iqr, skewness, kurtosis, ci_95_lower: ci_lower, ci_95_upper: ci_upper, sum };
}

function pearsonCorrelation(x, y) {
  const n = x.length;
  const r = jStat.corrcoeff(x, y);
  const r2 = r * r;
  const t = r * Math.sqrt((n - 2) / (1 - r2));
  const p = 2 * (1 - jStat.studentt.cdf(Math.abs(t), n - 2));
  const z = Math.atanh(r);
  const se = 1 / Math.sqrt(n - 3);
  const zcrit = jStat.normal.inv(0.975, 0, 1);
  const ci_lower = Math.tanh(z - zcrit * se);
  const ci_upper = Math.tanh(z + zcrit * se);
  const strength = strengthLabel(r);
  const significant = p < 0.05;
  return { r, r2, p_value: p, ci_95_lower: ci_lower, ci_95_upper: ci_upper, n, strength, significant };
}

function spearmanRho(x, y) {
  function rank(arr) {
    const sorted = arr.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v);
    const ranks = new Array(arr.length);
    for (let i = 0; i < sorted.length;) {
      let j = i;
      while (j < sorted.length && sorted[j].v === sorted[i].v) j++;
      const avgRank = (i + j + 1) / 2;
      for (let k = i; k < j; k++) ranks[sorted[k].i] = avgRank;
      i = j;
    }
    return ranks;
  }
  const rx = rank(x), ry = rank(y);
  const rho = jStat.corrcoeff(rx, ry);
  const n = x.length;
  const t = rho * Math.sqrt((n - 2) / (1 - rho * rho));
  const p = 2 * (1 - jStat.studentt.cdf(Math.abs(t), n - 2));
  const strength = strengthLabel(rho);
  const significant = p < 0.05;
  return { rho, p_value: p, n, strength, significant };
}

function linearRegression(x, y, xName, yName) {
  const n = x.length;
  const meanX = jStat.mean(x), meanY = jStat.mean(y);
  const ssxy = x.reduce((s, xi, i) => s + (xi - meanX) * (y[i] - meanY), 0);
  const ssxx = x.reduce((s, xi) => s + (xi - meanX) * (xi - meanX), 0);
  const slope = ssxy / ssxx;
  const intercept = meanY - slope * meanX;
  const predictions = x.map(xi => intercept + slope * xi);
  const residuals = y.map((yi, i) => yi - predictions[i]);
  const ssres = residuals.reduce((s, r) => s + r * r, 0);
  const sstot = y.reduce((s, yi) => s + (yi - meanY) * (yi - meanY), 0);
  const r2 = 1 - ssres / sstot;
  const r2adj = 1 - (1 - r2) * (n - 1) / (n - 2);
  const mse = ssres / (n - 2);
  const slopeSE = Math.sqrt(mse / ssxx);
  const interceptSE = Math.sqrt(mse * (1/n + meanX*meanX/ssxx));
  const slopeT = slope / slopeSE;
  const interceptT = intercept / interceptSE;
  const slopeP = 2 * (1 - jStat.studentt.cdf(Math.abs(slopeT), n - 2));
  const interceptP = 2 * (1 - jStat.studentt.cdf(Math.abs(interceptT), n - 2));
  const fStat = (sstot - ssres) / mse;
  const fP = 1 - jStat.centralF.cdf(fStat, 1, n - 2);
  const tcrit = jStat.studentt.inv(0.975, n - 2);
  const slopeCI_l = slope - tcrit * slopeSE, slopeCI_u = slope + tcrit * slopeSE;
  const intCI_l = intercept - tcrit * interceptSE, intCI_u = intercept + tcrit * interceptSE;
  const significant = fP < 0.05;
  const eq = yName + ' = ' + intercept.toFixed(4) + ' + ' + slope.toFixed(4) + ' * ' + xName;
  return { x_name: xName, y_name: yName, intercept, slope, r2, r2_adj: r2adj, f_statistic: fStat, f_pvalue: fP,
    slope_se: slopeSE, intercept_se: interceptSE, slope_t: slopeT, intercept_t: interceptT,
    slope_p: slopeP, intercept_p: interceptP, slope_ci_lower: slopeCI_l, slope_ci_upper: slopeCI_u,
    intercept_ci_lower: intCI_l, intercept_ci_upper: intCI_u, n, df_residual: n-2, mse,
    equation: eq, predictions, residuals, significant };
}

function leveneTest(x, y) {
  const mx = jStat.mean(x), my = jStat.mean(y);
  const zx = x.map(v => Math.abs(v - mx)), zy = y.map(v => Math.abs(v - my));
  const n1 = x.length, n2 = y.length;
  const mzx = jStat.mean(zx), mzy = jStat.mean(zy);
  const mz = (jStat.sum(zx) + jStat.sum(zy)) / (n1 + n2);
  const num = (n1 + n2 - 2) * (n1*(mzx-mz)*(mzx-mz) + n2*(mzy-mz)*(mzy-mz));
  const den = (zx.reduce((s,v)=>s+(v-mzx)*(v-mzx),0) + zy.reduce((s,v)=>s+(v-mzy)*(v-mzy),0));
  const W = num / den;
  const p = 1 - jStat.centralF.cdf(W, 1, n1 + n2 - 2);
  return { statistic: W, pvalue: p, equal: p >= 0.05 };
}

function independentTTests(x, y) {
  const n1 = x.length, n2 = y.length;
  const m1 = jStat.mean(x), m2 = jStat.mean(y);
  const s1 = jStat.stdev(x, true), s2 = jStat.stdev(y, true);
  const meanDiff = m1 - m2;
  // Student (equal var)
  const sp = Math.sqrt(((n1-1)*s1*s1 + (n2-1)*s2*s2) / (n1 + n2 - 2));
  const tStudent = meanDiff / (sp * Math.sqrt(1/n1 + 1/n2));
  const dfStudent = n1 + n2 - 2;
  const pStudent = 2 * (1 - jStat.studentt.cdf(Math.abs(tStudent), dfStudent));
  // Welch (proper Satterthwaite df)
  const seW = Math.sqrt(s1*s1/n1 + s2*s2/n2);
  const tWelch = meanDiff / seW;
  const numW = (s1*s1/n1 + s2*s2/n2) * (s1*s1/n1 + s2*s2/n2);
  const denW = (s1*s1/n1)*(s1*s1/n1)/(n1-1) + (s2*s2/n2)*(s2*s2/n2)/(n2-1);
  const dfWelch = numW / denW;
  const pWelch = 2 * (1 - jStat.studentt.cdf(Math.abs(tWelch), dfWelch));
  // Levene
  const lev = leveneTest(x, y);
  // Cohen's d
  const pooledStd = Math.sqrt((s1*s1 + s2*s2) / 2);
  const cohensD = pooledStd !== 0 ? meanDiff / pooledStd : 0;
  const dStrength = strengthLabel(cohensD);
  // CI
  const tCrit = jStat.studentt.inv(0.975, dfWelch);
  const ciL = meanDiff - tCrit * seW, ciU = meanDiff + tCrit * seW;
  return { n1, n2, mean1: m1, mean2: m2, std1: s1, std2: s2, mean_difference: meanDiff,
    ci_95_lower: ciL, ci_95_upper: ciU,
    levene_statistic: lev.statistic, levene_pvalue: lev.pvalue, variances_equal: lev.equal,
    student_t: tStudent, student_pvalue: pStudent, student_df: dfStudent, student_significant: pStudent < 0.05,
    welch_t: tWelch, welch_pvalue: pWelch, welch_df: dfWelch, welch_significant: pWelch < 0.05,
    cohens_d: cohensD, cohens_d_strength: dStrength };
}

function pairedTTest(x, y) {
  let xs = x.slice(), ys = y.slice();
  if (xs.length !== ys.length) { const m = Math.min(xs.length, ys.length); xs = xs.slice(0,m); ys = ys.slice(0,m); }
  const diffs = xs.map((xi, i) => xi - ys[i]);
  const n = diffs.length;
  const meanD = jStat.mean(diffs);
  const stdD = jStat.stdev(diffs, true);
  const seD = stdD / Math.sqrt(n);
  const t = meanD / seD;
  const df = n - 1;
  const p = 2 * (1 - jStat.studentt.cdf(Math.abs(t), df));
  const cohensD = stdD !== 0 ? meanD / stdD : 0;
  const dStrength = strengthLabel(cohensD);
  const tCrit = jStat.studentt.inv(0.975, df);
  const ciL = meanD - tCrit * seD, ciU = meanD + tCrit * seD;
  return { n_pairs: n, mean_difference: meanD, std_difference: stdD, se_difference: seD,
    t_statistic: t, p_value: p, df, ci_95_lower: ciL, ci_95_upper: ciU,
    cohens_d: cohensD, cohens_d_strength: dStrength, significant: p < 0.05 };
}

function oneSampleTTest(data, h0) {
  const n = data.length;
  const mean = jStat.mean(data);
  const std = jStat.stdev(data, true);
  const sem = std / Math.sqrt(n);
  const t = (mean - h0) / sem;
  const df = n - 1;
  const p = 2 * (1 - jStat.studentt.cdf(Math.abs(t), df));
  const tCrit = jStat.studentt.inv(0.975, df);
  const ciL = mean - tCrit * sem, ciU = mean + tCrit * sem;
  const cohensD = std !== 0 ? (mean - h0) / std : 0;
  return { n, mean, std, sem, hypothesized_mean: h0, t_statistic: t, p_value: p, df,
    ci_95_lower: ciL, ci_95_upper: ciU, cohens_d: cohensD, significant: p < 0.05 };
}

// Shapiro-Wilk (Royston 1995 approximation)
function shapiroWilk(data) {
  const n = data.length;
  if (n < 3 || n > 5000) return { statistic: null, pvalue: null };
  const sorted = data.slice().sort((a,b) => a - b);
  const mean = jStat.mean(sorted);
  const m = new Array(n);
  for (let i = 0; i < n; i++) m[i] = jStat.normal.inv((i + 1 - 0.375) / (n + 0.25), 0, 1);
  const sumM2 = m.reduce((s,v) => s + v*v, 0);
  const c = m.map(v => v / Math.sqrt(sumM2));
  const a = new Array(n);
  a[n-1] = c[n-1]; a[0] = -c[n-1];
  if (n > 3) {
    const mm = m.map(v => v*v);
    const ssm = mm.reduce((s,v) => s + v, 0);
    a[n-2] = c[n-2] - m[n-1] * m[n-2] * a[n-1] / (1 - m[n-1]*m[n-1]);
    a[1] = -a[n-2];
    for (let i = 2; i < n - 2; i++) {
      a[n-1-i] = c[n-1-i] / Math.sqrt((ssm - m[n-1-i]*m[n-1-i]) / (1 - m[n-1-i]*m[n-1-i]));
      a[i] = -a[n-1-i];
    }
  }
  const W_num = a.reduce((s, ai, i) => s + ai * sorted[i], 0);
  const W = (W_num * W_num) / sorted.reduce((s, v) => s + (v-mean)*(v-mean), 0);
  let mu, sigma;
  if (n <= 11) {
    mu = 0.5440 - 0.39978 * n + 0.025054 * n*n - 0.0006714 * n*n*n;
    sigma = Math.exp(1.3822 - 0.77857 * n + 0.062767 * n*n - 0.0020322 * n*n*n);
  } else {
    const lnN = Math.log(n), lnN2 = lnN * lnN, lnN3 = lnN2 * lnN;
    mu = -1.5861 - 0.31082 * lnN - 0.083751 * lnN2 + 0.0038915 * lnN3;
    sigma = Math.exp(0.4803 - 0.082676 * lnN + 0.0030302 * lnN2);
  }
  const z = (Math.log(1 - W) - mu) / sigma;
  const p = 1 - jStat.normal.cdf(z, 0, 1);
  return { statistic: W, pvalue: p };
}

// D'Agostino-Pearson omnibus K²
function dagostinoTest(data) {
  const n = data.length;
  const skew = jStat.skewness(data);
  const kurt = jStat.kurtosis(data);
  // Skewness -> Z1
  const b = 3*(n*n + 27*n - 70)*(n+1)*(n+3) / ((n-2)*(n+5)*(n+7)*(n+9));
  const w2 = -1 + Math.sqrt(2*(b-1));
  const d = 1 / Math.sqrt(Math.log(Math.sqrt(w2)));
  const y = skew * Math.sqrt((n+1)*(n+3) / (6*(n-2)));
  const z1 = d * Math.log(y/w2 + Math.sqrt(y*y/(w2*w2) + 1));
  // Kurtosis -> Z2
  const Ek = 3*(n-1)/(n+1);
  const vk = 24*n*(n-2)*(n-3) / ((n+1)*(n+1)*(n+3)*(n+5));
  const x = (kurt - Ek) / Math.sqrt(vk);
  const b1_2 = 6*(n*n - 5*n + 2) / ((n+7)*(n+9)) * Math.sqrt(6*(n+3)*(n+5) / (n*(n-2)*(n-3)));
  const A = 6 + 8/b1_2 * (2/b1_2 + Math.sqrt(1 + 4/(b1_2*b1_2)));
  let z2 = ((1 - 2/(9*A)) - Math.cbrt((1 - 2/A) / (1 + x*Math.sqrt(2/(A-4)))));
  z2 = z2 / Math.sqrt(2/(9*A));
  const K2 = z1*z1 + z2*z2;
  const p = 1 - jStat.chisquare.cdf(K2, 2);
  return { statistic: K2, pvalue: p };
}

function normalityTests(data, name) {
  const n = data.length;
  const sw = shapiroWilk(data);
  const dag = dagostinoTest(data);
  return { name, n,
    shapiro_statistic: sw.statistic, shapiro_pvalue: sw.pvalue,
    shapiro_normal: sw.pvalue !== null ? sw.pvalue >= 0.05 : null,
    dagostino_statistic: dag.statistic, dagostino_pvalue: dag.pvalue,
    dagostino_normal: dag.pvalue >= 0.05 };
}

function ksTwoSample(x, y) {
  const all = [...x, ...y].sort((a,b)=>a-b);
  const nx = x.length, ny = y.length;
  let D = 0;
  for (let i = 0; i < all.length; i++) {
    const cx = x.filter(v => v <= all[i]).length / nx;
    const cy = y.filter(v => v <= all[i]).length / ny;
    D = Math.max(D, Math.abs(cx - cy));
  }
  const n = nx * ny / (nx + ny);
  const lambda = (Math.sqrt(n) + 0.12 + 0.11 / Math.sqrt(n)) * D;
  let p = 0;
  for (let k = 1; k <= 100; k++) {
    const term = (k % 2 === 0 ? 1 : -1) * 2 * Math.exp(-2 * k * k * lambda * lambda);
    p += term;
    if (Math.abs(term) < 1e-10) break;
  }
  p = Math.max(0, Math.min(1, p));
  const significant = p < 0.05;
  return { statistic: D, pvalue: p, significant,
    conclusion: significant ? tr('dist_ks_diff') : tr('dist_ks_same') };
}

function mannWhitneyU(x, y) {
  const all = [...x.map(v=>({v, g:0})), ...y.map(v=>({v, g:1}))];
  all.sort((a,b) => a.v - b.v);
  for (let i = 0; i < all.length;) {
    let j = i;
    while (j < all.length && all[j].v === all[i].v) j++;
    const avgRank = (i + j + 1) / 2;
    for (let k = i; k < j; k++) all[k].rank = avgRank;
    i = j;
  }
  const R1 = all.filter(o => o.g === 0).reduce((s,o) => s + o.rank, 0);
  const n1 = x.length, n2 = y.length;
  const U1 = R1 - n1*(n1+1)/2;
  const U2 = n1*n2 - U1;
  const U = Math.min(U1, U2);
  const mu = n1*n2/2;
  const sigma = Math.sqrt(n1*n2*(n1+n2+1)/12);
  const z = (U - mu) / sigma;
  const p = 2 * (1 - jStat.normal.cdf(Math.abs(z), 0, 1));
  const rankBiserial = 1 - 2 * U / (n1 * n2);
  return { u: U, pvalue: p, significant: p < 0.05, rank_biserial: rankBiserial };
}

function runAllAnalyses(d1, d2, name1, name2) {
  if (d1.length < 2 || d2.length < 2) return { error: tr('err_insufficient') };
  const n = Math.min(d1.length, d2.length);
  return {
    descriptive1: descriptiveStats(d1, name1),
    descriptive2: descriptiveStats(d2, name2),
    pearson: pearsonCorrelation(d1.slice(0,n), d2.slice(0,n)),
    spearman: spearmanRho(d1.slice(0,n), d2.slice(0,n)),
    regression_2on1: linearRegression(d1.slice(0,n), d2.slice(0,n), name1, name2),
    regression_1on2: linearRegression(d2.slice(0,n), d1.slice(0,n), name2, name1),
    independent_ttest: independentTTests(d1, d2),
    paired_ttest: pairedTTest(d1, d2),
    onesample_ttest1: oneSampleTTest(d1, hypMean1),
    onesample_ttest2: oneSampleTTest(d2, hypMean2),
    normality1: normalityTests(d1, name1),
    normality2: normalityTests(d2, name2),
    distribution_comparison: { ks: ksTwoSample(d1, d2), mw: mannWhitneyU(d1, d2) },
  };
}

function showResults(results, d1, d2) {
  window._results = results; window._d1 = d1; window._d2 = d2;
  const c = document.getElementById('result-content');
  const tabs = document.getElementById('result-tabs');
  tabs.innerHTML = ''; c.innerHTML = '';

  if (results.error) { c.innerHTML = '<div style="color:#ce9178;font-size:16px;padding:20px;text-align:center">' + results.error + '</div>'; return; }

  const name1 = results.descriptive1.name, name2 = results.descriptive2.name;

  const tabDefs = [
    ['desc', tr('tab_descriptive'), () => renderDescriptive(results, name1, name2)],
    ['corr', tr('tab_correlations'), () => renderCorrelations(results)],
    ['reg', tr('tab_regression'), () => renderRegression(results, name1, name2)],
    ['ttest', tr('tab_ttests'), () => renderTTests(results, name1, name2)],
    ['norm', tr('tab_normality'), () => renderNormality(results, name1, name2)],
    ['dist', tr('tab_distributions'), () => renderDistribution(results)],
    ['charts', tr('tab_charts'), () => { renderCharts(results, d1, d2, name1, name2); }],
  ];

  tabDefs.forEach(([id, label, fn]) => {
    const btn = document.createElement('button'); btn.textContent = label;
    btn.onclick = () => { tabs.querySelectorAll('button').forEach(b=>b.className=''); btn.className='active'; c.innerHTML=''; fn(); };
    tabs.appendChild(btn);
  });
  tabs.firstChild.click();
  document.getElementById('btn-export').disabled = false;
  document.getElementById('status-label').textContent = tr('status_done', {n1: d1.length, n2: d2.length});
  document.getElementById('status-label').style.color = '#4ec9b0';
  document.getElementById('statusbar').textContent = tr('statusbar_done', {n1: d1.length, n2: d2.length});
}

function runAnalysis() {
  const d1 = getData(1), d2 = getData(2);
  document.getElementById('status-label').textContent = tr('status_running');
  document.getElementById('status-label').style.color = '#888';
  const n1 = tr('ds1_tab'), n2 = tr('ds2_tab');
  const results = runAllAnalyses(d1, d2, n1, n2);
  showResults(results, d1, d2);
}

  const c = document.getElementById('result-content');

  // ═══ PEARSON r (sample) + ρ (population) ═══
  h += makeSection(tr('corr_pearson_title'));
  const pCls = p.significant ? 'sig' : 'not-sig';
  h += makeTable([
    [tr('corr_r'), p.r.toFixed(6)],
    [tr('corr_pop_rho'), p.r.toFixed(6)],
    [tr('corr_r2'), p.r2.toFixed(6)],
    [tr('corr_pvalue'), fmtP(p.p_value)],
    [tr('corr_ci'), '['+p.ci_95_lower.toFixed(4)+', '+p.ci_95_upper.toFixed(4)+']'],
    [tr('corr_strength'), strengthTr(p.strength)],
    [tr('corr_conclusion'), '<span class="'+pCls+'">'+(p.significant?tr('corr_significant'):tr('corr_not_significant'))+' (α=0.05)</span>'],
  ], [tr('corr_col_measure'), tr('corr_col_value')]);

  h += '<div class="commentary-title">' + tr('commentary_title') + '</div>';
  const dir = p.r >= 0 ? tr('direction_positive') : tr('direction_negative');
  h += makeCommentary(tr('comment_corr_pearson', {r:p.r.toFixed(3), strength:strengthTr(p.strength), direction:dir, pct:(p.r2*100).toFixed(1), r2:p.r2.toFixed(3)}));
  h += makeCommentary(tr('comment_corr_pop_rho', {rho:p.r.toFixed(3), ci: '['+p.ci_95_lower.toFixed(3)+', '+p.ci_95_upper.toFixed(3)+']'}));

  else h += makeCommentary(tr('comment_corr_not_significant', {p:fmtP(p.p_value)}));

  // ═══ SPEARMAN ρ (rank correlation) ═══
  h += makeSection(tr('corr_spearman_title'));
  const sCls = s.significant ? 'sig' : 'not-sig';
  h += makeTable([
    [tr('corr_rho'), s.rho.toFixed(6)],
    [tr('corr_pvalue'), fmtP(s.p_value)],
    [tr('corr_n_pairs'), s.n],
    [tr('corr_strength'), strengthTr(s.strength)],
    [tr('corr_conclusion'), '<span class="'+sCls+'">'+(s.significant?tr('corr_significant'):tr('corr_not_significant'))+' (α=0.05)</span>'],
  ], [tr('corr_col_measure'), tr('corr_col_value')]);

  const sDir = s.rho >= 0 ? tr('direction_positive') : tr('direction_negative');
  h += makeCommentary(tr('comment_corr_spearman', {rho:s.rho.toFixed(3), strength:strengthTr(s.strength), direction:sDir}));
  h += makeCommentary(tr('comment_corr_compare'));
  c.innerHTML = h;
}

    [tr('dist_mw_p'), fmtP(dc.mw.pvalue)],
    [tr('dist_mw_sig'), dc.mw.significant ? tr('ttest_yes') : tr('ttest_no')],
    [tr('dist_rb_r'), dc.mw.rank_biserial.toFixed(4)],
  ], [tr('desc_col_stat'), tr('corr_col_value')]);

  h += '<div class="commentary-title">' + tr('commentary_title') + '</div>';
  const ksWord = dc.ks.significant ? tr('comment_dist_ks_suggests') : tr('comment_dist_ks_not');
  h += makeCommentary(tr('comment_dist_ks', {result: ksWord}));
  const mwWord = dc.mw.significant ? tr('comment_dist_mw_indicates') : tr('comment_dist_mw_not');
  h += makeCommentary(tr('comment_dist_mw', {result: mwWord}));
  h += '<div class="note">' + tr('comment_dist_ks_note') + '</div>';
  c.innerHTML = h;
}

// ── CHARTS ──
function renderCharts(r, d1, d2, n1, n2) {
  const c = document.getElementById('result-content');
  const reg = r.regression_2on1;
  const n = Math.min(d1.length, d2.length);

  c.innerHTML = '<div class="chart-container" id="chart-hist"></div><div class="chart-container" id="chart-box"></div><div class="chart-container" id="chart-scatter"></div><div class="chart-container" id="chart-qq"></div><div class="chart-container" id="chart-resid"></div>';

  // Shared axis font styling for contrast
  const axFont = { title: { font: { color: '#ffffff', size: 13 } }, tickfont: { color: '#d0d0d0', size: 12 }, gridcolor: '#555' };
  const baseLayout = { template: 'plotly_dark', paper_bgcolor: '#1e1e1e', plot_bgcolor: '#252526', margin: { t: 40, b: 40, l: 50, r: 20 },
    font: { color: '#e0e0e0', size: 13 },
    title: { font: { color: '#ffffff', size: 15 } },
    legend: { font: { color: '#e0e0e0', size: 12 } } };

  function mkLayout(title, xTitle, yTitle, extra) {
    return { ...baseLayout, title, xaxis: { ...axFont, title: xTitle }, yaxis: { ...axFont, title: yTitle }, ...(extra||{}) };
  }

  // Histograms with KDE overlay
  // Kernel Density Estimation (Gaussian kernel, Silverman's rule)
  function kde(data, nPoints) {
    nPoints = nPoints || 200;
    const mean = jStat.mean(data), std = jStat.stdev(data, true);
    const bw = 1.06 * std * Math.pow(data.length, -0.2); // Silverman's rule
    const xMin = Math.min(...data) - 3*bw, xMax = Math.max(...data) + 3*bw;
    const step = (xMax - xMin) / nPoints;
    const xs = [], ys = [];
    const invSqrt2Pi = 1 / Math.sqrt(2 * Math.PI);
    for (let i = 0; i <= nPoints; i++) {
      const x = xMin + i * step;
      let density = 0;
      for (let j = 0; j < data.length; j++) {
        const z = (x - data[j]) / bw;
        density += Math.exp(-0.5 * z * z);
      }
      density *= invSqrt2Pi / (data.length * bw);
      xs.push(x); ys.push(density);
    }
    return { x: xs, y: ys };
  }
  const kde1 = kde(d1), kde2 = kde(d2);
  const nbins = Math.max(5, Math.ceil(Math.sqrt(Math.max(d1.length, d2.length))));
  const hTrace1 = { x: d1, type: 'histogram', name: n1, opacity: 0.5, marker: { color: '#569cd6' }, histnorm: 'probability density', nbinsx: nbins, showlegend: true };
  const hTrace2 = { x: d2, type: 'histogram', name: n2, opacity: 0.5, marker: { color: '#ce9178' }, histnorm: 'probability density', nbinsx: nbins, showlegend: true };
  const kTrace1 = { x: kde1.x, y: kde1.y, mode: 'lines', name: n1+' KDE', line: { color: '#80bfff', width: 2.5 }, showlegend: true };
  const kTrace2 = { x: kde2.x, y: kde2.y, mode: 'lines', name: n2+' KDE', line: { color: '#f0a080', width: 2.5 }, showlegend: true };
  Plotly.newPlot('chart-hist', [hTrace1, kTrace1, hTrace2, kTrace2], mkLayout(tr('chart_hist_title'), 'Value', 'Density'), { responsive: true });

  // Box plots
  const bTrace1 = { y: d1, type: 'box', name: n1, marker: { color: '#569cd6' } };
  const bTrace2 = { y: d2, type: 'box', name: n2, marker: { color: '#ce9178' } };
  Plotly.newPlot('chart-box', [bTrace1, bTrace2], mkLayout(tr('chart_box_title'), '', 'Value'), { responsive: true });

  // Scatter + regression line
  const xRange = [Math.min(...d1.slice(0,n)), Math.max(...d1.slice(0,n))];
  const regLine = { x: xRange, y: xRange.map(xv => reg.intercept + reg.slope * xv), mode: 'lines', name: reg.equation, line: { color: '#ce9178', width: 2 } };
  const scTrace = { x: d1.slice(0,n), y: d2.slice(0,n), mode: 'markers', type: 'scatter', name: 'Data', marker: { color: '#569cd6', size: 6 } };
  Plotly.newPlot('chart-scatter', [scTrace, regLine], mkLayout(tr('chart_scatter_title')+' (r='+r.pearson.r.toFixed(4)+')', n1, n2), { responsive: true });

  // Q-Q plots (side by side via overlay)
  function qqData(data) {
    const sorted = data.slice().sort((a,b)=>a-b);
    const len = sorted.length;
    const theo = sorted.map((_, i) => jStat.normal.inv((i+1-0.5)/len, 0, 1));
    return { theo, sample: sorted };
  }
  const qq1 = qqData(d1), qq2 = qqData(d2);
  const qqTrace1 = { x: qq1.theo, y: qq1.sample, mode: 'markers', type: 'scatter', name: n1, marker: { color: '#569cd6', size: 4 } };
  const qqTrace2 = { x: qq2.theo, y: qq2.sample, mode: 'markers', type: 'scatter', name: n2, marker: { color: '#ce9178', size: 4 } };
  Plotly.newPlot('chart-qq', [qqTrace1, qqTrace2], mkLayout(tr('chart_qq_title'), 'Theoretical Quantiles', 'Sample Quantiles'), { responsive: true });

  // Residuals vs Fitted
  const residTrace = { x: reg.predictions, y: reg.residuals, mode: 'markers', type: 'scatter', name: 'Residuals', marker: { color: '#569cd6', size: 5 } };
  Plotly.newPlot('chart-resid', [residTrace], mkLayout(tr('chart_resid_title'), 'Fitted Values', 'Residuals', { shapes: [{ type: 'line', x0: Math.min(...reg.predictions), x1: Math.max(...reg.predictions), y0: 0, y1: 0, line: { color: '#ce9178', dash: 'dash' } }] }), { responsive: true });
}

// 6. EXPORT
// ═══════════════════════════════════════════════════════════════
function exportResults() {
  if (!window._results || window._results.error) return;
  const results = window._results;

  // Export HTML
  const htmlContent = document.getElementById('result-content').innerHTML;
  const fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Statistical Analysis</title>' +
    '<style>' + document.querySelector('style').textContent + '</style></head><body style="background:#1e1e1e;color:#d4d4d4;padding:20px">' +
    '<h1>Statistical Analysis Results</h1>' + htmlContent + '</body></html>';
  const blob = new Blob([fullHtml], {type:'text/html'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'statistical_analysis.html'; a.click();

  // Export Excel
  const wb = XLSX.utils.book_new();
  function addSheet(name, rows) { const ws = XLSX.utils.aoa_to_sheet(rows); XLSX.utils.book_append_sheet(wb, ws, name); }

  const d1 = results.descriptive1, d2 = results.descriptive2;
  addSheet('Descriptive', [
    ['Statistic', d1.name, d2.name],
    ['N', d1.n, d2.n], ['Mean', d1.mean, d2.mean], ['Median', d1.median, d2.median],
    ['Std Dev', d1.std, d2.std], ['Variance', d1.variance, d2.variance],
    ['Min', d1.min, d2.min], ['Max', d1.max, d2.max],
    ['Q1', d1.q1, d2.q1], ['Q3', d1.q3, d2.q3], ['IQR', d1.iqr, d2.iqr],
    ['Skewness', d1.skewness, d2.skewness], ['Kurtosis', d1.kurtosis, d2.kurtosis],
  ]);

  const p = results.pearson, s = results.spearman;
  addSheet('Correlations', [
    ['Measure', 'Value'],
    ['Pearson r', p.r], ['Pearson r²', p.r2], ['Pearson p', p.p_value],
    ['Pearson 95% CI Lower', p.ci_95_lower], ['Pearson 95% CI Upper', p.ci_95_upper],
    ['Spearman ρ', s.rho], ['Spearman p', s.p_value],
  ]);

  const reg = results.regression_2on1;
  addSheet('Regression', [
    ['Measure', 'Value'], ['Equation', reg.equation], ['R²', reg.r2], ['Adj R²', reg.r2_adj],
    ['F', reg.f_statistic], ['F p', reg.f_pvalue],
    ['Intercept', reg.intercept], ['Slope', reg.slope], ['Slope SE', reg.slope_se], ['Slope p', reg.slope_p],
    ['MSE', reg.mse], ['N', reg.n],
  ]);

  const ind = results.independent_ttest;
  addSheet('t-Tests', [
    ['Measure', 'Student', 'Welch'],
    ['t', ind.student_t, ind.welch_t], ['df', ind.student_df, ind.welch_df.toFixed(1)],
    ['p', ind.student_pvalue, ind.welch_pvalue],
    ['Significant', ind.student_significant?'Yes':'No', ind.welch_significant?'Yes':'No'],
    ['Levene F', ind.levene_statistic, ''], ['Levene p', ind.levene_pvalue, ''],
    ['Mean diff', ind.mean_difference, ''], ["Cohen's d", ind.cohens_d, ''],
  ]);

  XLSX.writeFile(wb, 'statistical_analysis.xlsx');
}
