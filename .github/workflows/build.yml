name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 scipy statsmodels pandas matplotlib openpyxl numpy pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name="StatisticsTool" `
            --hidden-import=scipy `
            --hidden-import=statsmodels `
            --hidden-import=matplotlib `
            --hidden-import=matplotlib.backends.backend_qt5agg `
            --hidden-import=pandas `
            --hidden-import=openpyxl `
            --hidden-import=numpy `
            --hidden-import=PyQt5 `
            --hidden-import=PyQt5.sip `
            --hidden-import=i18n `
            --hidden-import=export_results `
            --noconsole main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: StatisticsTool-Windows
          path: dist/StatisticsTool.exe