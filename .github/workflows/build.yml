name: Build Multi-Platform

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==2.0.2 scipy statsmodels pandas matplotlib openpyxl PyQt5 pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name="StatisticsTool" `
            --hidden-import=scipy `
            --hidden-import=statsmodels `
            --hidden-import=matplotlib `
            --hidden-import=matplotlib.backends.backend_qt5agg `
            --hidden-import=pandas `
            --hidden-import=openpyxl `
            --hidden-import=numpy `
            --hidden-import=PyQt5 `
            --hidden-import=PyQt5.sip `
            --hidden-import=i18n `
            --hidden-import=export_results `
            --noconsole main.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: StatisticsTool-Windows
          path: dist/StatisticsTool.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pyqt5 python3-matplotlib python3-scipy python3-pandas python3-numpy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install statsmodels openpyxl pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name="StatisticsTool" `
            --hidden-import=scipy `
            --hidden-import=statsmodels `
            --hidden-import=matplotlib `
            --hidden-import=matplotlib.backends.backend_qt5agg `
            --hidden-import=pandas `
            --hidden-import=openpyxl `
            --hidden-import=numpy `
            --hidden-import=PyQt5 `
            --hidden-import=PyQt5.sip `
            --hidden-import=i18n `
            --hidden-import=export_results `
            --noconsole main.py

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: StatisticsTool-Linux
          path: dist/StatisticsTool
